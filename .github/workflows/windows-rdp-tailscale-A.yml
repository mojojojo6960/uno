name: Windows RDP via Tailscale (A)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:
        description: "Tailscale tailnet (e.g. you@gmail.com)"
        required: true
      ts_api_key:
        description: "Tailscale API key (device admin, no 'Bearer')"
        required: true
      ts_authkey:
        description: "Tailscale auth key (reusable or ephemeral)"
        required: true
      gh_api_token:
        description: "GitHub Personal Access Token (classic; scopes: repo, workflow)"
        required: true
      test_mode:
        description: "Run 5-minute test loop"
        type: boolean
        default: false
      runtime_minutes:
        description: "Runtime in minutes (max 360; capped to 355)"
        required: false
        default: "355"
      loops:
        description: "How many handoffs (0 = infinite)"
        required: false
        default: "0"

concurrency:
  group: tailscale-rdp-singleton
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

env:
  RDP_USER: Bullettemporary
  RDP_PASS: Bullet@12345
  TS_HOSTNAME: bullet

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 370

    steps:
      - name: 🔧 Resolve inputs (safe)
        id: cfg
        env:
          RAW_TAILNET: ${{ inputs.ts_tailnet }}
          RAW_APIKEY: ${{ inputs.ts_api_key }}
          RAW_AUTHKEY: ${{ inputs.ts_authkey }}
          RAW_PAT: ${{ inputs.gh_api_token }}
          RAW_TEST: ${{ inputs.test_mode == true && 'true' || 'false' }}
          RAW_RUNTIME: ${{ inputs.runtime_minutes || '355' }}
          RAW_LOOPS: ${{ inputs.loops || '0' }}
        run: |
          function ToIntOr($v, $def) {
            if ("$v" -match '^\d+$') { [int]$v } else { [int]$def }
          }

          $tailnet = $env:RAW_TAILNET
          $apiKey  = $env:RAW_APIKEY
          $authKey = $env:RAW_AUTHKEY
          $pat     = $env:RAW_PAT

          if (-not $tailnet -or -not $apiKey -or -not $authKey -or -not $pat) {
            Write-Error "Missing required inputs"
            exit 1
          }

          $isTest = ($env:RAW_TEST -match '^(?i:true|1|yes|on)$')

          $runtime = ToIntOr $env:RAW_RUNTIME 355
          if ($isTest) { $runtime = 5 }

          if (-not $isTest -and $runtime -lt 6) { $runtime = 355 }
          if ($runtime -gt 360) { $runtime = 355 }

          $loops = ToIntOr $env:RAW_LOOPS 0
          if ($loops -lt 0) { $loops = 0 }

          "tailnet=$tailnet" | Out-File -Append $env:GITHUB_OUTPUT
          "apikey=$apiKey"   | Out-File -Append $env:GITHUB_OUTPUT
          "authkey=$authKey" | Out-File -Append $env:GITHUB_OUTPUT
          "pat=$pat"         | Out-File -Append $env:GITHUB_OUTPUT
          "runtime=$runtime" | Out-File -Append $env:GITHUB_OUTPUT
          "loops=$loops"     | Out-File -Append $env:GITHUB_OUTPUT

      - name: ⚙️ Install Tailscale
        run: |
          $exe = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $exe)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
            $dst = "$env:TEMP\tailscale-setup.exe"
            Invoke-WebRequest -Uri $url -OutFile $dst -UseBasicParsing
            Start-Process -FilePath $dst -ArgumentList "/quiet" -Wait
          }
          Start-Service Tailscale -ErrorAction SilentlyContinue
          & $exe version

      - name: 🔐 Enable RDP user + firewall
        run: |
          $u="${{ env.RDP_USER }}"
          $p="${{ env.RDP_PASS }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force

          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group Administrators -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
          }

          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 📦 Install Release Tools
        run: |
          $tmp="$env:TEMP"
          
          # Function to download and verify
          function Safe-Install {
            param($Url, $OutFile, $Args)
            
            Write-Host "Downloading from: $Url"
            
            # Download with retry
            $retries = 3
            while ($retries -gt 0) {
              try {
                Invoke-WebRequest -Uri $Url -OutFile $OutFile -UseBasicParsing -ErrorAction Stop
                Write-Host "Downloaded to: $OutFile"
                break
              } catch {
                $retries--
                Write-Host "Download failed, retries left: $retries"
                if ($retries -eq 0) { throw }
                Start-Sleep -Seconds 2
              }
            }
            
            # Verify file exists and has size > 0
            if (-not (Test-Path $OutFile)) {
              throw "Download failed: File not created"
            }
            
            $fileSize = (Get-Item $OutFile).Length
            Write-Host "File size: $fileSize bytes"
            
            if ($fileSize -eq 0) {
              throw "Download failed: File is empty"
            }
            
            # Install
            Write-Host "Installing..."
            Start-Process $OutFile -ArgumentList $Args -Wait
            Write-Host "Installation complete"
          }
          
          # qBittorrent
          Safe-Install -Url "https://downloads.sourceforge.net/project/qbittorrent/qbittorrent-win32/qbittorrent-4.6.3/qbittorrent_4.6.3_x64_setup.exe" `
                       -OutFile "$tmp\qb.exe" `
                       -Args "/S"
          
          # MKVToolNix
          Safe-Install -Url "https://mkvtoolnix.download/windows/releases/86.0/mkvtoolnix-64-bit-86.0-setup.exe" `
                       -OutFile "$tmp\mkvtoolnix.exe" `
                       -Args "/S"
          
          # MediaInfo GUI
          Safe-Install -Url "https://mediaarea.net/download/binary/mediainfo-gui/24.01/MediaInfo_GUI_24.01_Windows.exe" `
                       -OutFile "$tmp\mediainfo.exe" `
                       -Args "/S"
          
          # Advanced Renamer
          Safe-Install -Url "https://www.advancedrenamer.com/down/advanced_renamer_setup.exe" `
                       -OutFile "$tmp\renamer.exe" `
                       -Args "/VERYSILENT"
          
          # JDownloader2
          Safe-Install -Url "https://installer.jdownloader.org/JDownloader2Setup.exe" `
                       -OutFile "$tmp\jd.exe" `
                       -Args "/S"

      - name: 🔗 Tailscale up
        id: up
        run: |
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          & $ts logout | Out-Null
          & $ts up --authkey "${{ steps.cfg.outputs.authkey }}" --hostname "${{ env.TS_HOSTNAME }}" --accept-routes --accept-dns=false

          Start-Sleep -Seconds 3

          $ip4 = (& $ts ip -4 | Select-Object -First 1)
          $status = & $ts status --json | ConvertFrom-Json
          $fqdn = $status.Self.DNSName
          $derp = $status.Self.DERP

          "ip4=$ip4"   | Out-File -Append $env:GITHUB_OUTPUT
          "fqdn=$fqdn" | Out-File -Append $env:GITHUB_OUTPUT
          "derp=$derp" | Out-File -Append $env:GITHUB_OUTPUT

      - name: ⏳ Keep alive
        run: |
          $mins=[int]"${{ steps.cfg.outputs.runtime }}"
          $end=(Get-Date).AddMinutes($mins)
          while((Get-Date) -lt $end){
            Start-Sleep -Seconds 60
          }

      - name: 🔁 Dispatch workflow B
        if: always()
        env:
          GH_TOKEN: ${{ steps.cfg.outputs.pat }}
        run: |
          $loops=[int]"${{ steps.cfg.outputs.loops }}"
          if ($loops -eq 1) { 
            Write-Host "Last iteration, not dispatching"
            exit 0 
          }
          if ($loops -gt 1) { 
            $next=$loops-1 
          } else { 
            $next=0
          }
          
          Write-Host "Dispatching workflow B with next loops=$next"
          
          # Create dispatch payload
          $body=@{
            ref    = "${{ github.ref_name }}"
            inputs = @{
              ts_tailnet      = "${{ steps.cfg.outputs.tailnet }}"
              ts_api_key      = "${{ steps.cfg.outputs.apikey }}"
              ts_authkey      = "${{ steps.cfg.outputs.authkey }}"
              gh_api_token    = "${{ steps.cfg.outputs.pat }}"
              test_mode       = "false"
              runtime_minutes = "${{ steps.cfg.outputs.runtime }}"
              loops           = "$next"
            }
          } | ConvertTo-Json -Depth 5
          
          # Try to dispatch
          $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/windows-rdp-tailscale-B.yml/dispatches"
          
          try {
            Write-Host "Dispatching to: $uri"
            
            $response = Invoke-RestMethod -Method POST `
              -Uri $uri `
              -Headers @{ 
                Authorization = "Bearer ${{ steps.cfg.outputs.pat }}"
                Accept = "application/vnd.github+json"
                "X-GitHub-Api-Version" = "2022-11-28"
              } `
              -Body $body `
              -ContentType "application/json" `
              -ErrorAction Stop
            
            Write-Host "✅ Successfully dispatched workflow B"
          }
          catch {
            Write-Host "❌ Dispatch failed: $_"
            
            # Check if workflow exists
            try {
              $checkUri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows"
              $workflows = Invoke-RestMethod -Uri $checkUri -Headers @{
                Authorization = "Bearer ${{ steps.cfg.outputs.pat }}"
                Accept = "application/vnd.github+json"
              }
              
              $workflowExists = $workflows.workflows | Where-Object { $_.path -like "*windows-rdp-tailscale-B.yml*" }
              
              if (-not $workflowExists) {
                Write-Host "⚠️ Workflow B file not found in repository!"
                Write-Host "Please create .github/workflows/windows-rdp-tailscale-B.yml with workflow_dispatch trigger"
              }
            }
            catch {
              Write-Host "Could not check workflows: $_"
            }
            
            # Don't fail the job on dispatch error
            Write-Host "Continuing despite dispatch error"
          }
