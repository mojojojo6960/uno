- name: 📦 Install Release Tools
  run: |
    $tmp="$env:TEMP"
    
    # Function to download and verify
    function Safe-Install {
      param($Url, $OutFile, $Args)
      
      # Download with retry
      $retries = 3
      while ($retries -gt 0) {
        try {
          Invoke-WebRequest -Uri $Url -OutFile $OutFile -UseBasicParsing -ErrorAction Stop
          break
        } catch {
          $retries--
          if ($retries -eq 0) { throw }
          Start-Sleep -Seconds 2
        }
      }
      
      # Verify file exists and has size > 0
      if (-not (Test-Path $OutFile) -or (Get-Item $OutFile).Length -eq 0) {
        throw "Download failed: $Url"
      }
      
      # Install
      Start-Process $OutFile -ArgumentList $Args -Wait
    }
    
    # qBittorrent - using verified working URL
    Safe-Install -Url "https://sourceforge.net/projects/qbittorrent/files/qbittorrent-win32/qbittorrent-4.6.3/qbittorrent_4.6.3_x64_setup.exe/download" `
                 -OutFile "$tmp\qb.exe" `
                 -Args "/S"
    
    # MKVToolNix
    Safe-Install -Url "https://mkvtoolnix.download/windows/releases/86.0/mkvtoolnix-64-bit-86.0-setup.exe" `
                 -OutFile "$tmp\mkvtoolnix.exe" `
                 -Args "/S"
    
    # MediaInfo GUI
    Safe-Install -Url "https://mediaarea.net/download/binary/mediainfo-gui/24.01/MediaInfo_GUI_24.01_Windows.exe" `
                 -OutFile "$tmp\mediainfo.exe" `
                 -Args "/S"
    
    # Advanced Renamer
    Safe-Install -Url "https://www.advancedrenamer.com/down/advanced_renamer_setup.exe" `
                 -OutFile "$tmp\renamer.exe" `
                 -Args "/VERYSILENT"
    
    # JDownloader2
    Safe-Install -Url "https://installer.jdownloader.org/JDownloader2Setup.exe" `
                 -OutFile "$tmp\jd.exe" `
                 -Args "/S"

- name: 🔁 Dispatch workflow B
  if: always()
  env:
    GH_TOKEN: ${{ steps.cfg.outputs.pat }}
  run: |
    $loops=[int]"${{ steps.cfg.outputs.loops }}"
    if ($loops -eq 1) { exit 0 }
    if ($loops -gt 1) { $next=$loops-1 } else { $next=0 }
    
    # First verify workflow exists
    $workflowFile="windows-rdp-tailscale-B.yml"
    $repo="${{ github.repository }}"
    
    # Check if workflow exists using GitHub CLI
    $check = gh workflow list --all --repo $repo 2>&1 | Select-String $workflowFile
    
    if (-not $check) {
      Write-Host "⚠️ Warning: Workflow $workflowFile not found! Creating fallback..."
      
      # Create minimal workflow file if missing
      $fallbackContent = @'
name: Windows RDP via Tailscale (B)
on: workflow_dispatch
jobs:
  rdp:
    runs-on: windows-2022
    steps:
      - run: echo "Handoff completed"
'@
      
      # Create workflow via API
      $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($fallbackContent))
      
      $body = @{
        message = "Create fallback workflow B"
        content = $encoded
        branch = "${{ github.ref_name }}"
      } | ConvertTo-Json
      
      try {
        Invoke-RestMethod -Method PUT `
          -Uri "https://api.github.com/repos/$repo/contents/.github/workflows/$workflowFile" `
          -Headers @{ 
            Authorization = "Bearer ${{ steps.cfg.outputs.pat }}"
            Accept = "application/vnd.github+json"
          } `
          -Body $body
        Write-Host "✅ Created fallback workflow"
        Start-Sleep -Seconds 5
      } catch {
        Write-Host "❌ Failed to create workflow: $_"
      }
    }
    
    # Dispatch with error handling
    $body=@{
      ref    = "${{ github.ref_name }}"
      inputs = @{
        ts_tailnet      = "${{ steps.cfg.outputs.tailnet }}"
        ts_api_key      = "${{ steps.cfg.outputs.apikey }}"
        ts_authkey      = "${{ steps.cfg.outputs.authkey }}"
        gh_api_token    = "${{ steps.cfg.outputs.pat }}"
        test_mode       = "false"
        runtime_minutes = "${{ steps.cfg.outputs.runtime }}"
        loops           = "$next"
      }
    } | ConvertTo-Json -Depth 5
    
    try {
      Invoke-RestMethod -Method POST `
        -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/windows-rdp-tailscale-B.yml/dispatches" `
        -Headers @{ 
          Authorization = "Bearer ${{ steps.cfg.outputs.pat }}"
          Accept = "application/vnd.github+json"
        } `
        -Body $body
      Write-Host "✅ Dispatched workflow B"
    } catch {
      Write-Host "❌ Dispatch failed: $_"
      
      # Try alternative - direct repository dispatch
      $altBody = @{
        event_type = "trigger-workflow-b"
        client_payload = @{
          inputs = $body.inputs
        }
      } | ConvertTo-Json -Depth 5
      
      try {
        Invoke-RestMethod -Method POST `
          -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
          -Headers @{ 
            Authorization = "Bearer ${{ steps.cfg.outputs.pat }}"
            Accept = "application/vnd.github+json"
          } `
          -Body $altBody
        Write-Host "✅ Used repository dispatch fallback"
      } catch {
        Write-Host "❌ All dispatch methods failed"
        exit 1
      }
    }
